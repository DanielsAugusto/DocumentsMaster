# SonarQube Configuration
sonar.projectKey=controle-documentos
sonar.projectName=Controle de Documentos
sonar.projectVersion=1.0.0

# Server
sonar.host.url=http://localhost:9000

# Source
sonar.sources=src
sonar.sourceEncoding=UTF-8

# TypeScript / JavaScript
sonar.language=ts
sonar.typescript.tsconfigPaths=tsconfig.json,tsconfig.app.json

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/coverage/**

# Coverage (if applicable)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Ignore Tailwind CSS v4 false positives (Unknown at-rule)
sonar.issue.ignore.multicriteria=css1
sonar.issue.ignore.multicriteria.css1.ruleKey=css:S4662
sonar.issue.ignore.multicriteria.css1.resourceKey=**/*.css
